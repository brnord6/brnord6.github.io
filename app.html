<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soccer Trivia Quiz</title>

<style>
body {
  background:#0d0d0d;
  color:white;
  font-family:Arial;
  text-align:center;
}

nav {
  background:#1a1a2e;
  padding:10px;
}
nav a { color:#6aaee8; text-decoration:none; }

.container { max-width:700px; margin:auto; padding:20px; }

.card {
  background:#141414;
  padding:20px;
  border-radius:10px;
  transition:0.4s;
}

/* FLASH */
.flash-correct { animation:greenFlash 0.5s; }
.flash-wrong { animation:redFlash 0.5s; }

@keyframes greenFlash {
  50% { background:#00ff88; }
}
@keyframes redFlash {
  50% { background:#ff3b3b; }
}

.answers {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.answer-btn {
  padding:12px;
  background:#1e1e2e;
  border:none;
  color:white;
  cursor:pointer;
}

/* KEEP SELECTED COLOR */
.correct { background:#00cc66; color:black; }
.wrong { background:#cc3333; }

.next-btn {
  margin-top:10px;
  padding:12px;
  width:100%;
  background:#6aaee8;
  border:none;
  cursor:pointer;
}

.results { display:none; }

canvas.confetti {
  position:fixed;
  top:0; left:0;
  pointer-events:none;
}
</style>
</head>

<body>

<nav>
<a href="scratch.html">← Back to Soccer Page</a>
</nav>

<div class="container">

<div id="quiz">
  <div class="card">
    <h2 id="question"></h2>
    <div class="answers" id="answers"></div>
  </div>
  <button class="next-btn" onclick="next()">Next</button>
</div>

<div class="results" id="results">
  <h2 id="score"></h2>
  <button onclick="start()">Play Again</button>
</div>

</div>

<script>

const allQuestions = [
{q:"Haaland plays for?",o:["Bayern","Man City","Madrid","Chelsea"],a:1},
{q:"City stadium?",o:["Old Trafford","Etihad","Anfield","Camp Nou"],a:1},
{q:"Haaland position?",o:["GK","Def","Mid","Striker"],a:3},
{q:"Haaland country?",o:["Sweden","Norway","Denmark","Germany"],a:1},
{q:"Manager City?",o:["Klopp","Pep","Arteta","Mourinho"],a:1},
{q:"Players per team?",o:["9","10","11","12"],a:2},
{q:"Match length?",o:["80","90","100","120"],a:1},
{q:"Ball shape?",o:["Cube","Sphere","Oval","Flat"],a:1},
{q:"GK can use?",o:["Hands","Feet","Head","None"],a:0},
{q:"Messi country?",o:["Brazil","Argentina","Spain","France"],a:1},

{q:"Ronaldo country?",o:["Portugal","Spain","Italy","Brazil"],a:0},
{q:"Red card?",o:["Goal","Warn","Send off","Sub"],a:2},
{q:"Yellow card?",o:["Goal","Warn","Sub","Offside"],a:1},
{q:"Offside?",o:["Ahead","Out","Foul","Goal"],a:0},
{q:"Penalty spot?",o:["8","10","12","15"],a:2},
{q:"Corner from?",o:["Center","Corner","Side","Penalty"],a:1},
{q:"Pitch surface?",o:["Grass","Sand","Ice","Concrete"],a:0},
{q:"Subs allowed?",o:["3","5","7","9"],a:1},
{q:"Half length?",o:["30","40","45","60"],a:2},
{q:"City rival?",o:["United","Liverpool","Arsenal","Chelsea"],a:0},

{q:"League country?",o:["Spain","England","Italy","Germany"],a:1},
{q:"VAR?",o:["Replay","Ref","Goal","Coach"],a:0},
{q:"Etihad is?",o:["Stadium","Team","League","City"],a:0},
{q:"Haaland old club?",o:["PSG","Dortmund","Barca","Milan"],a:1},
{q:"UCL?",o:["League","Tournament","Cup","Friendly"],a:1},
{q:"Ball size?",o:["3","4","5","6"],a:2},
{q:"Extra time?",o:["Yes","No","Sometimes","Never"],a:2},
{q:"Ref wears?",o:["Black","Blue","Red","Green"],a:0},
{q:"City color?",o:["Red","Blue","Green","Yellow"],a:1},
{q:"Haaland known for?",o:["Defense","Scoring","Passing","GK"],a:1}
];

let questions=[], current=0, score=0, locked=false;

function shuffle(a){ return [...a].sort(()=>Math.random()-0.5); }

function start(){
  questions = shuffle(allQuestions).slice(0,10);
  current=0; score=0;
  document.getElementById('quiz').style.display='block';
  document.getElementById('results').style.display='none';
  load();
}

function load(){
  locked=false;
  const q = questions[current];
  document.getElementById('question').textContent=q.q;

  const div=document.getElementById('answers');
  div.innerHTML='';

  q.o.forEach((opt,i)=>{
    const b=document.createElement('button');
    b.className='answer-btn';
    b.textContent=opt;
    b.onclick=()=>select(i,b);
    div.appendChild(b);
  });
}

function select(i,btn){
  if(locked) return;
  locked=true;

  const q=questions[current];
  const card=document.querySelector('.card');
  const buttons=document.querySelectorAll('.answer-btn');

  buttons.forEach(b=>b.disabled=true);

  if(i===q.a){
    score++;
    btn.classList.add('correct');
    card.classList.add('flash-correct');
  } else {
    btn.classList.add('wrong');
    buttons[q.a].classList.add('correct');
    card.classList.add('flash-wrong');
  }

  setTimeout(()=>card.classList.remove('flash-correct','flash-wrong'),500);
}

function next(){
  current++;
  if(current<questions.length){
    load();
  } else {
    end();
  }
}

function end(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('results').style.display='block';
  document.getElementById('score').textContent=score+"/10";

  if(score===10) confetti();
}

/* CONFETTI */
function confetti(){
  const c=document.createElement('canvas');
  c.className='confetti';
  document.body.appendChild(c);
  const ctx=c.getContext('2d');
  c.width=window.innerWidth;
  c.height=window.innerHeight;

  const pieces=Array.from({length:200},()=>({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    dy:Math.random()*3+2
  }));

  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    pieces.forEach(p=>{
      ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;
      ctx.fillRect(p.x,p.y,4,4);
      p.y+=p.dy;
      if(p.y>c.height)p.y=0;
    });
    requestAnimationFrame(draw);
  }
  draw();
}

start();

</script>

</body>
</html>
