<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soccer Trivia Quiz</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background:#0d0d0d;
  color:#e8e8e8;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
}

nav {
  width:100%;
  background:#1a1a2e;
  padding:14px;
}

nav a { color:#6aaee8; text-decoration:none; }

.container { max-width:700px; padding:40px; }

.card {
  background:#141414;
  padding:25px;
  border-radius:10px;
  transition:0.3s;
}

/* STRONG FLASH */
.flash-correct { animation:flashGreen 0.6s ease; }
.flash-wrong { animation:flashRed 0.6s ease; }

@keyframes flashGreen {
  0%{background:#141414;}
  50%{background:#00ff88;}
  100%{background:#141414;}
}

@keyframes flashRed {
  0%{background:#141414;}
  50%{background:#ff3b3b;}
  100%{background:#141414;}
}

.answers {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:15px;
}

.answer-btn {
  padding:12px;
  background:#1e1e2e;
  border:none;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

/* KEEP SELECTED HIGHLIGHT */
.answer-btn.correct { background:#00cc66; color:black; }
.answer-btn.wrong { background:#cc3333; }
.answer-btn.reveal { outline:3px solid #00ff88; }

.feedback {
  margin-top:15px;
  font-size:20px;
  font-weight:bold;
}

.next-btn {
  margin-top:10px;
  padding:12px;
  width:100%;
  background:#6aaee8;
  border:none;
  cursor:pointer;
}

.results { display:none; text-align:center; }

canvas.confetti {
  position:fixed;
  top:0; left:0;
  pointer-events:none;
}
</style>
</head>

<body>

<nav>
<a href="scratch.html">← Back to Soccer Page</a>
</nav>

<div class="container">

<div id="quiz-screen">
  <div class="card">
    <h2 id="q-text"></h2>
    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback"></div>
  </div>
  <button class="next-btn" id="next-btn">Next</button>
</div>

<div class="results" id="results-screen">
  <h2 id="final-score"></h2>
  <button onclick="startQuiz()">Play Again</button>
</div>

</div>

<script>

const allQuestions = [
  {
    q: "Which club does Erling Haaland play for?",
    options: ["Bayern Munich", "Manchester City", "Real Madrid", "Chelsea"],
    answer: 1
  },
  {
    q: "What is Manchester City's stadium?",
    options: ["Old Trafford", "Etihad Stadium", "Anfield", "Camp Nou"],
    answer: 1
  },
  {
    q: "What position does Haaland play?",
    options: ["Goalkeeper", "Defender", "Midfielder", "Striker"],
    answer: 3
  },
  {
    q: "What country is Haaland from?",
    options: ["Sweden", "Norway", "Denmark", "Germany"],
    answer: 1
  },
  {
    q: "Who is Man City's manager?",
    options: ["Klopp", "Guardiola", "Arteta", "Mourinho"],
    answer: 1
  },
  {
    q: "How many players on a team?",
    options: ["9", "10", "11", "12"],
    answer: 2
  },
  {
    q: "Match length?",
    options: ["80", "90", "100", "120"],
    answer: 1
  },
  {
    q: "Ball shape?",
    options: ["Cube", "Sphere", "Oval", "Flat"],
    answer: 1
  },
  {
    q: "Goalkeeper can use?",
    options: ["Hands", "Feet only", "Head", "None"],
    answer: 0
  },
  {
    q: "Messi country?",
    options: ["Brazil", "Argentina", "Spain", "France"],
    answer: 1
  },
  {
    q: "Ronaldo country?",
    options: ["Portugal", "Spain", "Italy", "Brazil"],
    answer: 0
  },
  {
    q: "Red card means?",
    options: ["Goal", "Warning", "Send off", "Sub"],
    answer: 2
  },
  {
    q: "Yellow card?",
    options: ["Goal", "Warning", "Sub", "Offside"],
    answer: 1
  },
  {
    q: "Offside?",
    options: ["Too far ahead", "Out of bounds", "Foul", "Goal"],
    answer: 0
  },
  {
    q: "Penalty distance?",
    options: ["8", "10", "12", "15"],
    answer: 2
  },
  {
    q: "Corner kick from?",
    options: ["Center", "Corner", "Side", "Penalty"],
    answer: 1
  },
  {
    q: "Pitch surface?",
    options: ["Grass", "Sand", "Ice", "Concrete"],
    answer: 0
  },
  {
    q: "Subs allowed?",
    options: ["3", "5", "7", "9"],
    answer: 1
  },
  {
    q: "Half length?",
    options: ["30", "40", "45", "60"],
    answer: 2
  },
  {
    q: "Man City rival?",
    options: ["United", "Liverpool", "Arsenal", "Chelsea"],
    answer: 0
  },
  {
    q: "Premier League country?",
    options: ["Spain", "England", "Italy", "Germany"],
    answer: 1
  },
  {
    q: "VAR means?",
    options: ["Replay system", "Ref", "Goal", "Coach"],
    answer: 0
  },
  {
    q: "Etihad is a?",
    options: ["Stadium", "Team", "League", "City"],
    answer: 0
  },
  {
    q: "Haaland former club?",
    options: ["PSG", "Dortmund", "Barca", "Milan"],
    answer: 1
  },
  {
    q: "Champions League is?",
    options: ["League", "Tournament", "Cup", "Friendly"],
    answer: 1
  },
  {
    q: "Ball size?",
    options: ["3", "4", "5", "6"],
    answer: 2
  },
  {
    q: "Extra time?",
    options: ["Yes", "No", "Sometimes", "Never"],
    answer: 2
  },
  {
    q: "Ref wears?",
    options: ["Black", "Blue", "Red", "Green"],
    answer: 0
  },
  {
    q: "Man City jersey color?",
    options: ["Red", "Blue", "Green", "Yellow"],
    answer: 1
  },
  {
    q: "Haaland is known for?",
    options: ["Defense", "Speed & scoring", "Passing", "Goalkeeping"],
    answer: 1
  }
];
}));

let questions=[], current=0, score=0, answered=false;

function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }

function startQuiz(){
  questions=shuffle(allQuestions).slice(0,10);
  current=0; score=0;
  document.getElementById('quiz-screen').style.display='block';
  document.getElementById('results-screen').style.display='none';
  loadQuestion();
}

function loadQuestion(){
  answered=false;
  const q=questions[current];
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('feedback').textContent="";
  const answersDiv=document.getElementById('answers');
  answersDiv.innerHTML='';

  q.options.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='answer-btn';
    btn.textContent=opt;
    btn.onclick=()=>selectAnswer(i,btn);
    answersDiv.appendChild(btn);
  });
}

function selectAnswer(i,btn){
  if(answered) return;
  answered=true;

  const q=questions[current];
  const card=document.querySelector('.card');
  const buttons=document.querySelectorAll('.answer-btn');

  buttons.forEach(b=>b.disabled=true);

  if(i===q.answer){
    score++;
    btn.classList.add('correct');
    card.classList.add('flash-correct');
    document.getElementById('feedback').textContent="CORRECT";
  } else {
    btn.classList.add('wrong');
    buttons[q.answer].classList.add('reveal');
    card.classList.add('flash-wrong');
    document.getElementById('feedback').textContent="INCORRECT";
  }

  setTimeout(()=>card.classList.remove('flash-correct','flash-wrong'),600);
}

document.getElementById('next-btn').onclick=()=>{
  current++;
  if(current<questions.length){
    loadQuestion();
  } else {
    showResults();
  }
};

function showResults(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('results-screen').style.display='block';
  document.getElementById('final-score').textContent=score+"/10";

  if(score===10) launchConfetti();
}

/* CONFETTI */
function launchConfetti(){
  const canvas=document.createElement('canvas');
  canvas.className='confetti';
  document.body.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  const pieces=Array.from({length:200},()=>({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    dy:Math.random()*4+2
  }));

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;
      ctx.fillRect(p.x,p.y,4,4);
      p.y+=p.dy;
      if(p.y>canvas.height)p.y=0;
    });
    requestAnimationFrame(draw);
  }
  draw();
}

startQuiz();

</script>
</body>
</html>
